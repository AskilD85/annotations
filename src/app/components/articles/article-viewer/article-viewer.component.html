<div class="container">
  <button routerLink="/">В список</button>
  <button [routerLink]="['/edit', article()?.id]">Редактировать</button>
  <button (click)="deleteArticle()">Удалить</button>
  <h2>{{ article()?.title || 'Без названия' }}</h2>
  <app-notification [text]="notificationText" [type]="'warning'"></app-notification>
  <app-annotation></app-annotation>
</div>
