<div class="container">
  <button routerLink="/">В список</button>
  <button [routerLink]="['/edit', sArticle()?.id]">Редактировать</button>
  <button (click)="deleteArticle()">Удалить</button>
  <h2>{{ sArticle()?.title || 'Без названия' }}</h2>
  <app-notification [notificationText]="notificationText" [type]="'warning'"></app-notification>
  <app-annotation></app-annotation>
</div>
